version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: hospital_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: hospital_db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hospital_backend
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/hospital_db
      JWT_SECRET: hospital_super_secret_jwt_key_change_in_production
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hospital_frontend
    ports:
      - '5173:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
